<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Haltere : disque gauche + barre + disque droit -->
  <g fill="#ffffff">
    <!-- Disque gauche (poids interieur + exterieur) -->
    <rect x="80" y="170" width="58" height="172" rx="16"/>
    <rect x="54" y="202" width="38" height="108" rx="10"/>
    <!-- Barre horizontale -->
    <rect x="90" y="234" width="332" height="44" rx="10"/>
    <!-- Disque droit -->
    <rect x="374" y="170" width="58" height="172" rx="16"/>
    <rect x="420" y="202" width="38" height="108" rx="10"/>
  </g>
</svg>
